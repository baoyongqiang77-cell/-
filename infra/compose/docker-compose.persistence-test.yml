services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drone_u0_test
      POSTGRES_USER: u0_test
      POSTGRES_PASSWORD: u0_test
    ports:
      - "${U0_POSTGRES_TEST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U u0_test -d drone_u0_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

